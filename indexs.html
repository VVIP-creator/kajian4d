*{

html,body{

body{

  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
  overflow-x:hidden;
}

/* MAIN SHELL */
.shell{
  max-width:520px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* HEADER */
.header{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.logo{
  width:320px;
  max-width:100%;
  height:72px;
  object-fit:contain;
  display:block;

  padding:4px;
  border-radius:14px;
  border:2px solid rgba(0,159,227,.88);

  background:
    radial-gradient(circle at top, rgba(255,255,255,.8), transparent 50%),
    linear-gradient(135deg, #ffffff, #e6f4fc, #009fe3);

  box-shadow:
    0 0 22px rgba(0,159,227,.4),
    0 0 42px rgba(0,191,255,.2),
    0 0 30px rgba(0,0,0,.05);
}

/* BLUE CARD WITH STRIPES */
.card{
  position:relative;
  width:100%;
  padding:20px;
  overflow:hidden;
  border-radius:22px;
  border:2px solid rgba(0,159,227,.72);

  /* Background card diubah menjadi biru gelap premium khas area jackpot aplikasi */
  background:
    radial-gradient(circle at top right, rgba(0,191,255,.3), transparent 40%),
    radial-gradient(circle at bottom left, rgba(255,255,255,.1), transparent 42%),
    linear-gradient(180deg, #021329, #002244 52%, #010b17);

  box-shadow:
    0 0 36px rgba(0,0,0,.3),
    0 0 34px rgba(0,159,227,.25),
    inset 0 0 26px rgba(255,255,255,.05),
    0 14px 48px rgba(0,0,0,.2);

  transition:all .35s ease;
}

.card:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:
    0 0 50px rgba(0,0,0,.4),
    0 0 56px rgba(0,159,227,.45),
    inset 0 0 30px rgba(0,159,227,.15),
    0 16px 60px rgba(0,0,0,.25);
}

/* SAKURA + INK TEXTURE DIUBAH MENJADI TEKSTUR GARIS DIAGONAL BIRU-PUTIH */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,.03) 0px,
      rgba(255,255,255,.03) 1px,
      transparent 1px,
      transparent 18px
    ),
    repeating-linear-gradient(
      45deg,
      rgba(0,159,227,.04) 0px,
      rgba(0,159,227,.04) 2px,
      transparent 2px,
      transparent 22px
    ),
    radial-gradient(circle at 18% 20%, rgba(0,191,255,.12), transparent 24%),
    radial-gradient(circle at 82% 76%, rgba(0,159,227,.15), transparent 30%);
  opacity:.95;
  z-index:0;
  pointer-events:none;
}

/* LIGHT SLIDER / SLASH EFFECT */
.card::after{
  content:"";
  position:absolute;
  top:18%;
  left:-50%;
  width:95%;
  height:3px;
  background:linear-gradient(90deg, transparent, #ffffff, #e6f4fc, #009fe3, transparent);
  box-shadow:
    0 0 18px rgba(255,255,255,.86),
    0 0 32px rgba(0,159,227,.76);
  transform:rotate(-18deg);
  animation:katanaSlash 4s ease-in-out infinite;
  z-index:0;
  pointer-events:none;
}

@keyframes katanaSlash{
  0%{
    left:-80%;
    opacity:0;
  }
  25%{
    opacity:1;
  }
  60%{
    opacity:.84;
  }
  100%{
    left:130%;
    opacity:0;
  }
}

.hero{

.btn{

  display:inline-block;
  text-decoration:none;
  text-align:center;
  padding:15px 16px;
  border-radius:14px;

  font-weight:900;
  letter-spacing:.6px;
  color:#ffffff;

  background:#002244;
  position:relative;
  overflow:hidden;
  transition:all .3s ease;
  z-index:1;

  text-transform:uppercase;
  text-shadow:
    0 1px 2px rgba(0,0,0,.8),
    0 0 9px rgba(0,159,227,.8);
}

/* ROTATING BLUE / WHITE BORDER */
.btn::before{
  content:"";
  position:absolute;
  top:-3px;
  left:-3px;
  right:-3px;
  bottom:-3px;

  background:
    conic-gradient(
      from 0deg,
      #ffffff,
      #e6f4fc,
      #00bfff,
      #009fe3,
      #005c97,
      #001122,
      #005c97,
      #009fe3,
      #ffffff
    );

  border-radius:16px;
  z-index:-2;
  animation:rotateBorder 3s linear infinite;
  filter:blur(6px);
}

/* BUTTON INNER */
.btn::after{
  content:"";
  position:absolute;
  inset:3px;
  background:
    radial-gradient(circle at top left, rgba(0,191,255,.3), transparent 40%),
    linear-gradient(180deg, #005c97 0%, #003366 58%, #001f3f 100%);
  border-radius:12px;
  z-index:-1;
}

.btn:hover{
  transform:translateY(-3px) scale(1.03);
  color:#ffffff;
  box-shadow:
    0 0 34px rgba(0,159,227,.86),
    0 0 44px rgba(255,255,255,.3);
  animation:samuraiPulse 1s infinite;
}

@keyframes rotateBorder{
  to{
    transform:rotate(360deg);
  }
}

@keyframes samuraiPulse{
  0%{
    box-shadow:0 0 24px rgba(0,159,227,.5);
  }
  50%{
    box-shadow:
      0 0 56px rgba(0,159,227,.8),
      0 0 42px rgba(255,255,255,.3);
  }
  100%{

  }
}

.badge::after{

.badge:hover{
